<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>約會扭蛋機 🇭🇰 - 浪漫提案</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ffafbd;
            --secondary-orange: #ffc3a0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #fceef0 0%, #ffe5d9 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .title-font { font-family: 'ZCOOL KuaiLe', cursive; }

        .gashapon-container {
            background: white;
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(255, 175, 189, 0.3);
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 4px solid #fff;
            position: relative;
        }

        .machine-window {
            width: 180px;
            height: 180px;
            background: #fffafa;
            border-radius: 50% 50% 15% 15%;
            margin: 0 auto 30px;
            position: relative;
            border: 6px solid #ff8a9a;
            overflow: hidden;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            padding: 15px;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.05);
        }

        .capsule { 
            width: 32px; 
            height: 32px; 
            border-radius: 50%; 
            margin: 6px; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1); 
        }
        .c-1 { background: linear-gradient(#ff7675, #fab1a0); }
        .c-2 { background: linear-gradient(#fdcb6e, #ffeaa7); }
        .c-3 { background: linear-gradient(#81ecec, #00cec9); }
        .c-4 { background: linear-gradient(#a29bfe, #6c5ce7); }

        .dial-knob {
            width: 80px;
            height: 80px;
            background: #f1f2f6;
            border-radius: 50%;
            margin: -50px auto 25px;
            border: 6px solid #ff8a9a;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .knob-line { width: 55px; height: 10px; background: #ff8a9a; border-radius: 5px; }

        .result-box {
            display: none;
            background: #fff9fa;
            border-radius: 25px;
            padding: 25px;
            margin-top: 10px;
            border: 2px solid #ffe5d9;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff7675 0%, #e63946 100%);
            color: white;
            padding: 14px 45px;
            border-radius: 35px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(230, 57, 70, 0.2);
            transition: 0.3s;
        }

        .btn-whatsapp { 
            background: #25d366; 
            color: white; 
            padding: 10px 20px; 
            border-radius: 25px; 
            font-size: 0.9rem; 
            margin-top: 15px; 
            font-weight: 600; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            transition: 0.2s;
        }
        .btn-whatsapp:active { transform: scale(0.95); }

        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake { 
            0%, 100% { transform: translateX(0); } 
            25% { transform: translateX(-8px) rotate(-2deg); } 
            75% { transform: translateX(8px) rotate(2deg); } 
        }
    </style>
</head>
<body>

    <div class="gashapon-container">
        <h1 class="title-font text-3xl text-[#e63946] mb-1">約會扭蛋機 🇭🇰</h1>
        <p class="text-gray-400 text-xs mb-10">點擊轉盤，解決「今日去邊好」</p>

        <div class="machine-window" id="window">
            <div class="capsule c-1"></div><div class="capsule c-2"></div>
            <div class="capsule c-3"></div><div class="capsule c-4"></div>
            <div class="capsule c-2"></div><div class="capsule c-1"></div>
            <div class="capsule c-4"></div><div class="capsule c-3"></div>
        </div>

        <div class="dial-knob" id="knob" onclick="spin()">
            <div class="knob-line"></div>
        </div>

        <div id="result" class="result-box">
            <div class="text-pink-500 text-xs font-bold uppercase tracking-widest mb-2">🎉 抽中提案</div>
            <h2 id="act-title" class="text-2xl font-bold text-gray-800 mb-3"></h2>
            <p id="act-desc" class="text-gray-600 leading-relaxed mb-6"></p>
            
            <button onclick="shareToWhatsApp()" class="btn-whatsapp">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/></svg>
                分享俾另一半
            </button>
        </div>

        <div class="mt-12">
            <button onclick="spin()" class="btn-primary text-lg">
                撳一撳 ‧ 抽約會
            </button>
        </div>
    </div>

    <script>
        let currentItem = null;

        const pool = [
            { t: "西九海濱草地 Picnic", d: "帶埋野餐墊去睇維港日落，吹住海風聽歌，享受慢活下午。" },
            { t: "深水埗文青半日遊", d: "大南街行吓黑膠碟舖、歎杯精品咖啡，感受老區新活力。" },
            { t: "赤柱週末歐陸風情", d: "行吓美利樓市集，喺海邊大街食餐露天晚餐，假裝喺外國度假。" },
            { t: "中環 PMQ 尋寶", d: "行吓本地設計師小店，再去上環樓梯街影返幾張文青相。" },
            { t: "大澳漁村貓島遊", d: "坐 20 蚊小艇睇棚屋，食大魚蛋同沙翁，尋找巷仔入面嘅貓貓。" },
            { t: "嘉頓山睇夜景", d: "15 分鐘輕鬆上山，望住全個深水埗萬家燈火，落山再食宵夜。" },
            { t: "荃灣南豐紗廠 (The Mills)", d: "室內冷氣充足，壁畫打卡位超多，仲有好多精緻嘅本地手作店。" },
            { t: "山頂盧吉道漫步", d: "全香港最美嘅步行徑，無斜路好易行，可以飽覽全個維港夜色。" },
            { t: "長洲單車一日遊", d: "食大魚蛋、芒果糯米糍，租架單車環島，去東灣沙灘踏浪。" },
            { t: "坪洲慢活生活", d: "座落無車嘅安靜小島，行吓牛皮廠藝術區，感受最純粹嘅寧靜。" },
            { t: "將軍澳南海濱踩單車", d: "踩過跨灣大橋，夜晚喺海邊長廊搵間 Bar 飲杯微醺啤酒。" },
            { t: "大埔大美督放風箏", d: "喺主壩踩單車、睇海，再去附近食個燒烤或者泰國菜。" },
            { t: "銅鑼灣唱 K 大賽", d: "搵間 K 房嗌番幾粒鐘，淨係為對方唱嗰首情歌。" },
            { t: "元朗下白泥落日", d: "全港最靚落日泥灘，影情侶相嘅首選地點，浪漫到極致。" },
            { t: "尖沙咀星光大道漫步", d: "最經典嘅拍拖路線，睇完幻彩詠香江再去 K11 Musea 睇藝術品。" }
        ];

        function spin() {
            const win = document.getElementById('window');
            const res = document.getElementById('result');
            const knob = document.getElementById('knob');
            
            knob.style.transform = 'rotate(180deg)';
            setTimeout(() => knob.style.transform = 'rotate(0deg)', 300);
            
            win.classList.add('shake');
            res.style.display = 'none';

            setTimeout(() => {
                win.classList.remove('shake');
                currentItem = pool[Math.floor(Math.random() * pool.length)];
                document.getElementById('act-title').innerText = currentItem.t;
                document.getElementById('act-desc').innerText = currentItem.d;
                res.style.display = 'block';
                popHearts();
            }, 600);
        }

        function popHearts() {
            for(let i=0; i<8; i++) {
                const h = document.createElement('div');
                h.innerHTML = '❤️';
                h.style.position = 'fixed';
                h.style.left = Math.random() * 80 + 10 + 'vw';
                h.style.top = '80%';
                h.style.fontSize = Math.random() * 20 + 15 + 'px';
                h.style.pointerEvents = 'none';
                h.style.zIndex = '100';
                document.body.appendChild(h);
                
                let y = 80;
                let opacity = 1;
                const anim = setInterval(() => {
                    y -= 1.5;
                    opacity -= 0.02;
                    h.style.top = y + '%';
                    h.style.opacity = opacity;
                    h.style.transform = `translateX(${Math.sin(y/10)*20}px)`;
                    if(opacity <= 0) { clearInterval(anim); h.remove(); }
                }, 20);
            }
        }

        function shareToWhatsApp() {
            const message = `親愛的，呢個週末不如去呢度拍拖？💖\n\n📍 提案：${currentItem.t}\n📝 內容：${currentItem.d}\n\n（抽多幾個請開：[你的 GitHub 連結]）`;
            const encoded = encodeURIComponent(message);
            window.open(`https://api.whatsapp.com/send?text=${encoded}`, '_blank');
        }
    </script>
</body>
</html>
