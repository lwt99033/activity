<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>約會扭蛋機 🇭🇰 - 浪漫分享版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ffafbd;
            --secondary-orange: #ffc3a0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #fceef0 0%, #ffe5d9 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .title-font { font-family: 'ZCOOL KuaiLe', cursive; }

        .gashapon-container {
            background: white;
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(255, 175, 189, 0.3);
            padding: 2rem;
            width: 100%;
            max-width: 480px;
            text-align: center;
            border: 4px solid #fff;
            position: relative;
        }

        .machine-window {
            width: 180px;
            height: 180px;
            background: #fffafa;
            border-radius: 50% 50% 15% 15%;
            margin: 0 auto 25px;
            position: relative;
            border: 6px solid #ff8a9a;
            overflow: hidden;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            padding: 15px;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.05);
        }

        .capsule { width: 28px; height: 28px; border-radius: 50%; margin: 5px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .c-1 { background: linear-gradient(#ff7675, #fab1a0); }
        .c-2 { background: linear-gradient(#fdcb6e, #ffeaa7); }
        .c-3 { background: linear-gradient(#81ecec, #00cec9); }
        .c-4 { background: linear-gradient(#a29bfe, #6c5ce7); }

        .dial-knob {
            width: 70px;
            height: 70px;
            background: #f1f2f6;
            border-radius: 50%;
            margin: -45px auto 20px;
            border: 6px solid #ff8a9a;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .knob-line { width: 45px; height: 8px; background: #ff8a9a; border-radius: 4px; }

        .result-box {
            display: none;
            background: #fff9fa;
            border-radius: 25px;
            padding: 20px;
            margin-top: 10px;
            border: 2px solid #ffe5d9;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .ai-guide {
            text-align: left;
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 15px;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #333;
            border-left: 4px solid #ff7675;
            max-height: 300px;
            overflow-y: auto;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff7675 0%, #e63946 100%);
            color: white;
            padding: 14px 40px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(230, 57, 70, 0.2);
            transition: 0.3s;
        }

        .btn-ai-spark { background: #6c5ce7; color: white; padding: 8px 18px; border-radius: 20px; font-size: 0.8rem; margin-top: 12px; }
        .btn-whatsapp { background: #25d366; color: white; padding: 8px 18px; border-radius: 20px; font-size: 0.8rem; margin-top: 12px; margin-left: 8px; display: none; }

        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

    <div class="gashapon-container">
        <h1 class="title-font text-3xl text-[#e63946] mb-1">約會扭蛋機 🇭🇰</h1>
        <p class="text-gray-400 text-xs mb-8">專屬香港情侶的甜蜜週末</p>

        <div class="machine-window" id="window">
            <div class="capsule c-1"></div><div class="capsule c-2"></div>
            <div class="capsule c-3"></div><div class="capsule c-4"></div>
            <div class="capsule c-2"></div><div class="capsule c-1"></div>
        </div>

        <div class="dial-knob" id="knob" onclick="spin()">
            <div class="knob-line"></div>
        </div>

        <div id="result" class="result-box">
            <h2 id="act-title" class="text-xl font-bold text-gray-800 mb-1"></h2>
            <p id="act-desc" class="text-gray-500 text-sm italic mb-4"></p>
            
            <div class="flex justify-center flex-wrap gap-2">
                <button id="ai-btn" onclick="askGemini()" class="btn-ai-spark">🪄 AI 香港攻略</button>
                <button id="share-btn" onclick="shareToWhatsApp()" class="btn-whatsapp">📲 WhatsApp 分享</button>
            </div>

            <div id="ai-response" class="hidden">
                <div class="ai-guide" id="ai-text"></div>
            </div>
        </div>

        <div class="mt-8">
            <button onclick="spin()" class="btn-primary">撳一撳 ‧ 抽約會</button>
        </div>
    </div>

    <script>
        const apiKey = "";
        let currentItem = null;
        let aiPlanRaw = "";

        const pool = [
            { t: "深水埗文青半日遊", d: "大南街歎咖啡，行吓黑膠碟舖，再食個維記豬潤麵。" },
            { t: "西九海濱草地 Picinic", d: "帶埋野餐墊去睇日落，仲可以租單車沿海邊踩。" },
            { t: "中環 PMQ 尋寶", d: "行吓本地手作小店，再去上環樓梯街影文青相。" },
            { t: "赤柱週末歐陸風情", d: "行吓美利樓，喺赤柱大街食餐法國菜，感受海風。" },
            { t: "昂坪 360 睇大佛", d: "坐纜車遠眺港珠澳大橋，去心經簡林散步。" },
            { t: "嘉頓山睇夜景", d: "喺深水埗食完宵夜，行 15 分鐘樓梯上山睇萬家燈火。" },
            { t: "旺角中心掃街 + 影貼紙相", d: "重拾中學拍拖回憶，買杯珍珠奶茶掃魚蛋。" },
            { t: "荃灣南豐紗廠 (The Mills)", d: "室內打卡勝地，入面有好多本地創意設計店舖。" },
            { t: "大澳漁村探險", d: "坐小艇睇白海豚，同巷仔啲貓貓影相，食大魚蛋。" },
            { t: "觀塘工廈工作坊", d: "皮革 DIY、Tufting 織地毯，兩個人一齊整。" }
        ];

        async function fetchAI(prompt) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: "你是一位香港地道的約會專家。請針對抽出的活動，為香港情侶提供簡短、地道、浪漫的約會建議。包括具體店名和一個貼心小提示。" }] }
                    })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (err) { return "AI 休息中，一陣再試！"; }
        }

        function spin() {
            const win = document.getElementById('window');
            const res = document.getElementById('result');
            const shareBtn = document.getElementById('share-btn');
            
            win.classList.add('shake');
            res.style.display = 'none';
            shareBtn.style.display = 'none';
            document.getElementById('ai-response').classList.add('hidden');

            setTimeout(() => {
                win.classList.remove('shake');
                currentItem = pool[Math.floor(Math.random() * pool.length)];
                document.getElementById('act-title').innerText = currentItem.t;
                document.getElementById('act-desc').innerText = currentItem.d;
                res.style.display = 'block';
            }, 600);
        }

        async function askGemini() {
            const btn = document.getElementById('ai-btn');
            const text = document.getElementById('ai-text');
            const resp = document.getElementById('ai-response');
            const shareBtn = document.getElementById('share-btn');
            
            btn.innerText = "諗緊攻略...";
            btn.disabled = true;

            aiPlanRaw = await fetchAI(`我地抽到去「${currentItem.t}」，請幫我地呢對香港情侶規劃一個超浪漫行程！`);
            
            text.innerHTML = aiPlanRaw.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            resp.classList.remove('hidden');
            btn.innerText = "🪄 攻略已生成";
            shareBtn.style.display = 'inline-block';
        }

        function shareToWhatsApp() {
            const message = `親愛的，呢個週末不如去呢度拍拖？💖\n\n📍 活動：${currentItem.t}\n📝 簡介：${currentItem.d}\n\n✨ AI 浪漫攻略建議：\n${aiPlanRaw.substring(0, 150)}...\n\n（睇埋完整攻略，快啲開扭蛋機 App 啦！）`;
            const encoded = encodeURIComponent(message);
            window.open(`https://api.whatsapp.com/send?text=${encoded}`, '_blank');
        }
    </script>
</body>
</html>
